{% load static %}

<!doctype html>
<html lang="en">
    <head>
        {% block meta %}
            <!-- Required meta tags -->
            <meta http-equiv="X-UA-Compatible" content="ie=edge">
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            
            <!-- SEO -->
            <meta name="description" content="Discover freshly baked goods online at our bakery. Enjoy artisan breads, pastries, cakes, and authentic German baked goods, all crafted with premium ingredients and delivered to your doorstep.">
            <meta name="keywords" content="online bakery, homemade baked goods, German cakes, cakes, breads, pastries, order cake online, freshly baked goods, artisan bakery, fresh bread, German bread">
        {% endblock %}

        <!-- Optional Extra Meta Block -->
        {% block extra_meta %}
        {% endblock %}

        {% block corecss %}
            <!-- Bootstrap CSS -->
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        {% endblock %}

         <!-- Optional Extra CSS Block -->
        {% block extra_css %}
        {% endblock %}

        {% block corejs %}
            <!-- Bootstrap JS including Popper -->
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
        {% endblock %}

        <!-- Optional Extra JS Block -->
        {% block extra_js %}
        {% endblock %}

        <!-- Title-->
        <title>Bake Me Happy {% block extra_title %}{% endblock %}</title>
  </head>

  <body>

  </body>
</html>
